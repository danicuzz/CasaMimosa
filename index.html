<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Mimosa</title>

<style>
:root {
  --primary:#d4a017;
  --dark:#222;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  color:var(--dark);
  padding-top:80px;
}

header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.8);
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  z-index:1000;
  flex-wrap:wrap;
}

nav{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  font-size:0.9rem;
}

.lang-toggle{cursor:pointer;}

.hero{
  height:90vh;
  background:url('images/background.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero h1{
  background:rgba(0,0,0,0.5);
  color:white;
  padding:20px;
  text-align:center;
}

section{
  padding:60px 20px;
  max-width:1000px;
  margin:auto;
}

h2{
  margin-bottom:20px;
  color:var(--primary);
}

.apartment-desc,
.about p,
.pricing p,
.contact-text{
  line-height:1.6;
}

.apartment-desc{
  margin-bottom: 15px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
}

.gallery img,
.about img{
  width:100%;
  height:200px;
  object-fit:cover;
  cursor:pointer;
}

.about{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
}

.about img{max-width:400px;}

iframe{
  width:100%;
  height:350px;
  border:0;
}

footer{
  background:var(--dark);
  color:white;
  text-align:center;
  padding:20px;
}

/* LIGHTBOX */
#lightbox{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:2000;
}
#lightbox img{
  max-width:90%;
  max-height:90%;
}
#lightbox-close{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:2rem;
  cursor:pointer;
}
</style>
</head>

<body onload="setLang('it')">

<header>
<div><strong>Casa Mimosa +39 334 6273583</strong></div>
<nav>
<a href="#home" data-key="nav_home">Home</a>
<a href="#apartment" data-key="nav_apartment">Apartment</a>
<a href="#location" data-key="nav_location">Location</a>
<a href="#prices" data-key="nav_prices">Prices</a>
<a href="#about" data-key="nav_about">About</a>
<a href="#contact" data-key="nav_contact">Contact</a>
<span class="lang-toggle" onclick="setLang('it')">IT</span>
<span class="lang-toggle" onclick="setLang('en')">EN</span>
<span class="lang-toggle" onclick="setLang('de')">DE</span>
</nav>
</header>

<div id="home" class="hero">
<h1 data-key="title"></h1>
</div>

<section id="apartment">
<h2 data-key="apartment"></h2>
<p class="apartment-desc" data-key="apartment_desc">
</p>

<div class="gallery">
<img src="images/background.jpg">
<img src="images/camera1.jpg">
<img src="images/camera2.jpg">
<img src="images/cucina1.jpg">
<img src="images/salotto2.jpg">
<img src="images/giardino1.jpg">
<img src="images/cucinino.jpg">
<img src="images/dettaglio.jpg">
<img src="images/panoramicamaps.jpg">
<img src="images/spiaggia.jpg">
<img src="images/planimetria.jpg">
</div>
</section>

<section id="location">
<h2 data-key="location"></h2>
<iframe src="https://www.google.com/maps?q=Via%20Intercomunale%2078A%20Terme%20Vigliatore&output=embed"></iframe>
</section>

<section id="prices">
<h2 data-key="prices"></h2>
<p class="pricing" data-key="prices_text"></p>
</section>

<section id="about">
<h2 data-key="about"></h2>
<div class="about">
<img src="images/famiglia.jpg">
<p data-key="about_text"></p>
</div>
</section>

<section id="contact">
<h2 data-key="contact"></h2>
<p class="contact-text" data-key="contact_text"></p>
</section>

<footer>Casa Mimosa – Tonnarella</footer>

<div id="lightbox">
<span id="lightbox-close">&times;</span>
<img id="lightbox-img">
</div>

<script>

};

function setLang(lang){
document.querySelectorAll("[data-key]").forEach(el=>{
const key=el.getAttribute("data-key");
if(translations[lang][key]){
el.innerHTML=translations[lang][key];
}
});
}

/* LIGHTBOX */
document.querySelectorAll(".gallery img, .about img").forEach(img=>{
img.onclick=()=>{
document.getElementById("lightbox-img").src=img.src;
document.getElementById("lightbox").style.display="flex";
};
});

document.getElementById("lightbox").onclick=e=>{
if(e.target.id==="lightbox"||e.target.id==="lightbox-close"){
document.getElementById("lightbox").style.display="none";
}
};
</script>

</body>
</html>
